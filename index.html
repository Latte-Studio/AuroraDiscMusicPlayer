<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuroraDisc Music Player</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wallpaper"></div>

  <main class="app">
    <section class="top-bar glass">
      <div>
        <p class="eyebrow">AuroraDisc Music Player</p>
        <h1>AuroraDisc</h1>
      </div>

      <label class="import-btn" for="folderInput">
        导入歌曲文件夹
      </label>
      <input
        id="folderInput"
        class="hidden-input"
        type="file"
        webkitdirectory
        directory
        multiple
        accept=".mp3,.png,.jpg,.jpeg,.webp,audio/mpeg,image/png,image/jpeg,image/webp"
      />
    </section>

    <section class="layout">
      <section class="player-card frameless">
        <div class="record-area">
          <div id="disc" class="disc">
            <div class="vinyl-ring ring-1"></div>
            <div class="vinyl-ring ring-2"></div>
            <div class="vinyl-ring ring-3"></div>
            <img id="cover" class="cover" alt="歌曲封面" />
            <span class="center-dot"></span>
          </div>
        </div>

        <div class="song-info">
          <p id="folderName" class="folder-name">请选择歌曲文件夹</p>
          <h2 id="songTitle">未导入歌曲</h2>
          <p id="songDesc">每首歌建议放在独立文件夹中：一个 MP3 + 一个 PNG 封面</p>
        </div>

        <div class="progress-panel">
          <input id="progress" class="progress" type="range" min="0" max="1000" value="0" />
          <div class="time-row">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
          </div>
        </div>

        <div class="controls">
          <button id="prevBtn" class="circle-btn" aria-label="上一曲">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 6h2v12H7V6Zm3.8 6 8.2 6V6l-8.2 6Z"/>
            </svg>
          </button>

          <button id="playBtn" class="play-btn" aria-label="开始或暂停">
            <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7L8 5Z"/>
            </svg>
          </button>

          <button id="nextBtn" class="circle-btn" aria-label="下一曲">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6h2v12h-2V6ZM5 18l8.2-6L5 6v12Z"/>
            </svg>
          </button>
        </div>

        <div class="extra-control">
          <span>音量</span>
          <input id="volume" class="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
        </div>

        <section class="lyrics-box">
          <div class="lyrics-head">
            <div>
              <p class="eyebrow">Lyrics</p>
              <h3>歌词</h3>
            </div>
            <span id="lyricsMode">未加载</span>
          </div>
          <div id="lyricsView" class="lyrics-view">
            <p class="lyric-line active">导入歌曲文件夹后，这里会显示 .lrc 或 .txt 歌词</p>
          </div>
        </section>
      </section>

      <aside class="playlist-card frameless">
        <div class="playlist-head">
          <div>
            <p class="eyebrow">Playlist</p>
            <h3>播放列表</h3>
          </div>
          <span id="songCount">0 首</span>
        </div>

        <div id="playlist" class="playlist">
          <div class="empty">
            <p>还没有歌曲</p>
            <span>点击右上角导入文件夹</span>
          </div>
        </div>

      </aside>
    </section>
  </main>

  <div id="toast" class="toast">提示</div>

  <script src="./script.js"></script>
</body>
</html>
